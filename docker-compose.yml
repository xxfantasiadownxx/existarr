services:
  existarr:
    build: .
    container_name: existarr
    ports:
      - "5100:5100"
    environment:
      - TVDB_API_KEY=c64b1f6c-4a39-49a0-a995-14d98995715d   # ← your TVDB v4 API key
      - MEDIA_ROOT=/media                # ← root inside the container (leave as-is)
    volumes:
      - /media/greg/:/media:ro    # ← set the LEFT side to your host media root
      - ./data:/data              #   show list & settings are persisted here
    restart: unless-stopped

